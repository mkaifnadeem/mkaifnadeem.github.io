<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rating Widget</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="Widget-container">
       <div class="face">
        <div class="eye-container">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
        <div class="mouth-container">
            <div id="mouth" class="happy-mouth"></div>
        </div>
       </div>

      <h1>How was it?</h1>

      <div class="ratings-container">
        <div class="rating-container">
            <div id="bad"></div>
            <p>bad</p>
        </div>


        <div class="rating-container">
            <div id="okay"></div>
            <p>okay</p>
        </div>

        <div class="rating-container">
            <div id="Good"></div>
            <p>Good</p>
        </div>
      </div>

      <p class="message">Choose the emotion that represent your experience</p>

    </div>

    <script src="js/script.js"></script>
  </body>
</html>
